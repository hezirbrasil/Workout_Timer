<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout App - Planos de Treino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Menu de Seleção -->
        <div id="workout-selector" class="selector-container">
            <div class="header">
                <h1>💪 Meu Treino</h1>
                <p>Selecione seu plano de treino</p>
            </div>

            <div class="workout-buttons">
                <button class="workout-btn btn-a" onclick="selectWorkout('A')">
                    <span class="workout-letter">A</span>
                    <span class="workout-name">Quadríceps</span>
                </button>
                <button class="workout-btn btn-b" onclick="selectWorkout('B')">
                    <span class="workout-letter">B</span>
                    <span class="workout-name">Posterior</span>
                </button>
                <button class="workout-btn btn-c" onclick="selectWorkout('C')">
                    <span class="workout-letter">C</span>
                    <span class="workout-name">Superiores</span>
                </button>
            </div>

            <!-- Estatísticas -->
            <div class="stats-section">
                <h3>📊 Treinos Este Mês</h3>
                <div id="history-stats" class="stats-grid"></div>
                <button id="clear-history-btn" class="secondary-btn">Limpar Histórico</button>
            </div>
        </div>

        <!-- Container do Treino -->
        <div id="workout-container" class="workout-container" style="display: none;">
            <div class="workout-header">
                <h2 id="workout-title"></h2>
                <button class="back-btn" onclick="backToMenu()">← Voltar</button>
            </div>

            <!-- Informações do Exercício -->
            <div id="exercise-container" class="exercise-container">
                <div class="exercise-info">
                    <h3 id="exercise-name"></h3>
                    <div class="exercise-details">
                        <div class="detail">
                            <span class="label">Séries</span>
                            <span id="sets-info" class="value"></span>
                        </div>
                        <div class="detail">
                            <span class="label">Repetições</span>
                            <span id="reps-info" class="value"></span>
                        </div>
                    </div>
                    <p id="exercise-progress" class="progress-text"></p>
                </div>

                <!-- Timer de Descanso -->
                <div id="timer-container" class="timer-container" style="display: none;">
                    <p>Tempo de Descanso</p>
                    <div class="timer-display" id="rest-timer">1:30</div>
                </div>

                <!-- Botões de Controle -->
                <div class="controls">
                    <button id="complete-set-btn" class="btn-primary">✓ Série Concluída</button>
                    
                    <div class="navigation-buttons">
                        <button id="prev-exercise-btn" class="btn-secondary">← Anterior</button>
                        <button id="next-exercise-btn" class="btn-secondary">Próximo →</button>
                    </div>
                    
                    <button id="complete-workout-btn" class="btn-success">🎉 Completar Treino</button>
                </div>
            </div>
        </div>
    </div>

    <script src="workouts.js"></script>
    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
